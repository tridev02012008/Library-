<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Library Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { padding: 15px; background: #0f172a; color: #f8fafc; }
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 25px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        /* Stats Dashboard Styling */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card h3 { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { font-size: 18px; font-weight: bold; color: #fff; margin-top: 5px; }
        
        .search-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .seat { padding: 15px 5px; text-align: center; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        /* Shift Wise Colors for Reserved Seats */
        .empty { background: linear-gradient(135deg, #10b981, #059669); }          /* Green */
        .allshift { background: linear-gradient(135deg, #6366f1, #4f46e5); }       /* Indigo */
        .morning { background: linear-gradient(135deg, #f59e0b, #d97706); }        /* Amber/Orange */
        .noon { background: linear-gradient(135deg, #3b82f6, #2563eb); }           /* Blue */
        .afternoon { background: linear-gradient(135deg, #ec4899, #db2777); }      /* Pink */
        .evening { background: linear-gradient(135deg, #14b8a6, #0d9488); }        /* Teal */
        .night { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }          /* Purple */
        
        /* Special Color for Unreserved Khali Seats (64 to 85) */
        .unreserved-empty { background: linear-gradient(135deg, #64748b, #475569); border: 2px dashed #94a3b8; } /* Greyish/Silver dashed border */

        .expiring { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #334155; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-save { background: #4f46e5; color: white; }
        .btn-cancel { background: #334155; color: white; }
        .btn-clear { background: #b91c1c; color: white; }
        
        /* Indicator label style inside modal */
        .seat-type-tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        .tag-reserved { background: rgba(79, 70, 229, 0.2); color: #818cf8; border: 1px solid #4f46e5; }
        .tag-unreserved { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid #64748b; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📚 Smart Library Pro</h2>
        <p style="font-size: 12px; opacity: 0.8;">Premium Management System</p>
    </div>

    <!-- Shift Count Dashboard -->
    <div class="stats">
        <div class="stat-card"><h3>Vacant (Khali)</h3><p id="count-vacant">105</p></div>
        <div class="stat-card"><h3>All Shift (6am-10pm)</h3><p id="count-allshift">0</p></div>
        <div class="stat-card"><h3>Morning (6am-10am)</h3><p id="count-morning">0</p></div>
        <div class="stat-card"><h3>Noon (10am-2pm)</h3><p id="count-noon">0</p></div>
        <div class="stat-card"><h3>Afternoon (2pm-6pm)</h3><p id="count-afternoon">0</p></div>
        <div class="stat-card"><h3>Evening (6pm-10pm)</h3><p id="count-evening">0</p></div>
        <div class="stat-card"><h3>Night (10pm-6am)</h3><p id="count-night">0</p></div>
    </div>

    <input type="text" id="search" class="search-box" placeholder="Search by name or seat number..." oninput="filterSeats()">

    <div class="grid" id="seats-grid"></div>

    <div class="modal" id="seatModal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2 id="modal-title">Seat Details</h2>
                <span id="seatTypeTag" class="seat-type-tag"></span>
            </div>
            
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="studentName">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="studentPhone">
            </div>
            <div class="form-group">
                <label>Renewal Date</label>
                <input type="date" id="renewalDate">
            </div>
            <div class="form-group">
                <label>Shift Selection</label>
                <select id="studentShift">
                    <option value="empty">Khali (Empty)</option>
                    <option value="allshift">All Shift (6 AM - 10 PM)</option>
                    <option value="morning">Morning (6 AM - 10 AM)</option>
                    <option value="noon">Noon (10 AM - 2 PM)</option>
                    <option value="afternoon">Afternoon (2 PM - 6 PM)</option>
                    <option value="evening">Evening (6 PM - 10 PM)</option>
                    <option value="night">Night (10 PM - 6 AM)</option>
                </select>
            </div>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn btn-clear" onclick="clearSeat()">Clear</button>
                <button class="btn btn-save" onclick="saveSeat()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_SEATS = 105;
        let libraryData = JSON.parse(localStorage.getItem('library_105_shifts_data')) || {};
        let activeSeat = null;

        // Check if a seat is unreserved (64 to 85)
        function isUnreservedSeat(seatNo) {
            return seatNo >= 64 && seatNo <= 85;
        }

        function isExpiring(dateStr) {
            if(!dateStr) return false;
            const expiry = new Date(dateStr);
            const today = new Date();
            const diffTime = expiry - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays >= 0 && diffDays <= 3;
        }

        function initGrid() {
            const grid = document.getElementById('seats-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= TOTAL_SEATS; i++) {
                const data = libraryData[i] || { name: '', phone: '', shift: 'empty', renewalDate: '' };
                const div = document.createElement('div');
                
                let cssClass = `seat ${data.shift}`;
                
                // If seat is empty AND falls between 64 and 85, apply special Unreserved class
                if(data.shift === 'empty' && isUnreservedSeat(i)) {
                    cssClass = 'seat unreserved-empty';
                } else if(data.shift !== 'empty' && isExpiring(data.renewalDate)) {
                    cssClass = 'seat expiring';
                }
                
                div.className = cssClass;
                div.id = `seat-card-${i}`;
                div.innerText = i;
                div.setAttribute('onclick', `openModal(${i})`);
                grid.appendChild(div);
            }
            updateStats();
        }

        function openModal(seatNo) {
            activeSeat = seatNo;
            document.getElementById('modal-title').innerText = `Seat ${seatNo}`;
            
            // Set Reserved/Unreserved tag in modal popup
            const tag = document.getElementById('seatTypeTag');
            if(isUnreservedSeat(seatNo)) {
                tag.innerText = "UNRESERVED";
                tag.className = "seat-type-tag tag-unreserved";
            } else {
                tag.innerText = "RESERVED";
                tag.className = "seat-type-tag tag-reserved";
            }

            const data = libraryData[seatNo] || { name: '', phone: '', shift: 'empty', renewalDate: '' };
            document.getElementById('studentName').value = data.name;
            document.getElementById('studentPhone').value = data.phone;
            document.getElementById('studentShift').value = data.shift;
            document.getElementById('renewalDate').value = data.renewalDate;
            document.getElementById('seatModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('seatModal').style.display = 'none'; }

        function saveSeat() {
            const name = document.getElementById('studentName').value;
            const phone = document.getElementById('studentPhone').value;
            const shift = document.getElementById('studentShift').value;
            const renewalDate = document.getElementById('renewalDate').value;
            
            if(shift === 'empty') delete libraryData[activeSeat];
            else libraryData[activeSeat] = { name, phone, shift, renewalDate };
            
            localStorage.setItem('library_105_shifts_data', JSON.stringify(libraryData));
            initGrid(); closeModal();
        }

        function clearSeat() { delete libraryData[activeSeat]; localStorage.setItem('library_105_shifts_data', JSON.stringify(libraryData)); initGrid(); closeModal(); }

        function updateStats() {
            let counts = { allshift: 0, morning: 0, noon: 0, afternoon: 0, evening: 0, night: 0, occupied: 0 };
            
            for(let i = 1; i <= TOTAL_SEATS; i++) {
                if(libraryData[i]) {
                    counts.occupied++;
                    if(counts.hasOwnProperty(libraryData[i].shift)) {
                        counts[libraryData[i].shift]++;
                    }
                }
            }
            document.getElementById('count-allshift').innerText = counts.allshift;
            document.getElementById('count-morning').innerText = counts.morning;
            document.getElementById('count-noon').innerText = counts.noon;
            document.getElementById('count-afternoon').innerText = counts.afternoon;
            document.getElementById('count-evening').innerText = counts.evening;
            document.getElementById('count-night').innerText = counts.night;
            document.getElementById('count-vacant').innerText = TOTAL_SEATS - counts.occupied;
        }

        function filterSeats() {
            const val = document.getElementById('search').value.toLowerCase();
            for(let i = 1; i <= TOTAL_SEATS; i++) {
                const card = document.getElementById(`seat-card-${i}`);
                const data = libraryData[i];
                let match = i.toString() === val;
                if(data && (data.name.toLowerCase().includes(val) || data.phone.includes(val))) match = true;
                if(!val) card.style.display = 'block';
                else card.style.display = match ? 'block' : 'none';
            }
        }
        initGrid();
    </script>
</body>
</html>
